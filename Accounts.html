<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 20px;
            background: rgb(55, 94, 94);
            font-family: "Poppins", sans-serif;
            color: #333;
            text-align: center;
        }

        /* Sign In Button */
        a {
            text-decoration: none;
            color: pink;
            background-color: white;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 18px;
            transition: 0.3s;
            position: absolute;
            right: 20px;
            top: 20px;
        }

        a:hover {
            background-color: #7b2bd5;
            transform: scale(1.05);
        }

        /* Welcome Section */
        #welcomemessage {
            margin-top: 40px;
            margin-bottom: 30px;
            color: pink;
        }

        #welcomemessage h1 {
            margin: 0;
            font-size: 40px;
            letter-spacing: 2px;
        }

        #user {
            color: #8a3cdf;
            font-weight: bold;
        }

        /* Orders Container */
        #pending {
            max-width: 800px;
            margin: 0 auto;
        }

        /* Home Button */
        .home-btn {
            position: absolute;
            left: 20px;
            top: 20px;
            right: auto;
        }
    </style>
</head>

<body>

    <a href="SignIn.Html">Sign In</a>

    <a href="index.HTML" class="home-btn">
        <i class="bi bi-house"></i> Home
    </a>

    <div id="welcomemessage">
        <h1>Welcome back</h1>
        <h1 id="user"></h1>
    </div>

       <div id="pending">
                
                
            </div>

  

    <script type="module" src="Accounts.js"></script>

</body>
</html>
