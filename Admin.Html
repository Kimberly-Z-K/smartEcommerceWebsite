<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
   body {
    margin: 0;
    font-family: 'Lucida Sans Unicode', sans-serif;
    background: linear-gradient(135deg, #A8DCAB, #C0C9EE);
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* ===== Header ===== */
h1 {
    font-size: 60px;
    margin-top: 20px;
    color: pink;
    text-shadow: 3px 1px 3px rgb(245, 14, 133);
}

/* ===== Home icon ===== */
#homeicon {
    font-size: 60px;
    color: pink;
    text-shadow: 3px 1px 3px rgb(245, 14, 133);
    margin-bottom: 10px;
    transition: 0.3s;
}

#homeicon:hover {
    color: #BDB2FF;
    transform: scale(1.15);
}

/* ===== Dashboard container ===== */
.dashboard {
    width: 95%;
    max-width: 1200px;
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

/* ===== Left menu ===== */
.menu {
    width: 260px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* ===== Menu buttons ===== */
button {
    font-family: 'Lucida Sans Unicode';
    font-size: 18px;
    padding: 15px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    background: #375E5E;
    color: pink;
    text-shadow: 2px 1px 2px rgb(245, 14, 133);
    transition: 0.25s;
}

button:hover {
    background: #2D5555;
    transform: scale(1.05);
}

/* secondary buttons */
#removeProd, #red, #orderRemov, #addProduct {
    background: #C0C9EE;
    color: #5b2a86;
    text-shadow: none;
}

/* ===== Right panel ===== */
.panel {
    flex: 1;
    background: rgba(255,255,255,0.85);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    min-height: 500px;
}

/* ===== Forms ===== */
form {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

label {
    font-weight: bold;
    color: #5b2a86;
}

input, select {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

input:focus, select:focus {
    border-color: #BDB2FF;
    box-shadow: 0 0 6px rgba(189,178,255,0.6);
}

/* ===== Orders cards ===== */
#orders {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
}

#orders div {
    background: white;
    border-radius: 12px;
    padding: 15px;
    width: 320px;
    max-height: 500px;
    overflow-y: auto;
    box-shadow: 0 6px 15px rgba(0,0,0,0.15);
}

/* ===== Analytics charts ===== */
#analyticsSection canvas {
    background: white;
    border-radius: 12px;
    padding: 10px;
    margin-top: 10px;
}

/* hidden by default */
#removeProd, #red, #orderRemov {
    display: none;
}

    </style>
</head>
<body>
 

<header class="admin-header">
    <h1>ADMIN</h1>
    <a href="index.HTML" id="homeiconlink">
        <i class="bi bi-house" id="homeicon"></i>
    </a>
</header>

<div class="dashboard">

    <!-- LEFT MENU -->
    <aside class="menu">
        <button id="add">Add Product</button>
        <button id="remove">Remove Products</button>
        <button id="order">Orders</button>
        <button id="analytics">Analytics</button>
    </aside>

    <!-- RIGHT PANEL -->
    <main class="panel" style="background-color: white;">
        <!--starting image-->
        <video 
     width="400"
    autoplay
    muted
    loop
    playsinline
    disablePictureInPicture
    controlsList="nodownload noremoteplayback"
    style="margin-left: 25%;"
     >
    <source src="PixVerse_V6_Image_Text_360P_Create_a_smooth_hi-Picsart-BackgroundRemover (1).mp4" type="video/webm">
   </video>

        <!-- ADD PRODUCT -->
        <section id="newproducts" class="section" style="display:none">
            <div class="section-header">
                <h2>Add Product</h2>
               
            </div>

            <div class="product-layout">
                <div class="image-side">
                    <input type="file" id="imageInput" accept="image/*">
                    <div id="preview"></div>
                </div>

                <form id="addProductForm" >
                    <label for="cat">Category:</label>
                    <select id="cat">
                        <option value="Hot_Drinks">Hot Drinks</option>
                        <option value="Cold_Drinks">Cold Drinks</option>
                        <option value="Donuts">Donuts</option>
                        <option value="Cakes">Cakes</option>
                        <option value="Cake_Slices">Cake Slices</option>
                        <option value="Breakfast">Breakfast</option>
                    </select>

                    <label for="productname">Product Name:</label>
                    <input id="productname" placeholder="Enter product name" required>

                    <label for="descript">Description:</label>
                    <input id="descript" placeholder="Write description" required>

                    <label for="count">Quantity:</label>
                    <input id="count" placeholder="Enter quantity" required>

                    <label for="price">Price:</label>
                    <input id="price" placeholder="Enter product price" required>

                    <button id="addProduct">ADD PRODUCT</button>
                </form>
            </div>
        </section>

        <!-- REMOVE PRODUCT -->
        <section id="removal" class="section" style="display:none">
            <div class="section-header">
                <h2>Remove Product</h2>
                <button id="red">Clean Screen</button>
            </div>

            <form id="removeProductForm">
                <label for="prodname">Product Name:</label>
                <input id="prodname" placeholder="Enter product name">
                <button id="removeProduct">Remove</button>
            </form>
        </section>

        <!-- ORDERS -->
        <section id="orders" class="section" style="display:none ">
            <div class="section-header">
                <h2>Orders</h2>
                
            </div>
        </section>

        <!-- ANALYTICS -->
        <section id="analyticsSection" class="section analytics" style="display:none">
            <h2>Sales Analytics</h2>

            <div class="chart-box">
                <canvas id="topSellingChart"></canvas>
            </div>

            <div class="chart-box">
                <canvas id="loyalClientsChart"></canvas>
            </div>
        </section>

    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module" src="Admin.js"></script>



</body>
</html>
