<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Lucida Sans Unicode', sans-serif;
            background: linear-gradient(135deg, #A8DCAB, #C0C9EE);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }

        h1 {
            font-size: 60px;
            color: pink;
            text-shadow: 3px 1px 3px rgb(245, 14, 133);
            margin-bottom: 10px;
        }

        p {
            width: 60%;
            max-width: 700px;
            font-size: 18px;
            text-align: center;
            color: #333;
            background: rgba(255,255,255,0.6);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            margin: 10px 0;
            backdrop-filter: blur(8px);
        }

        #homeiconlink {
            position: absolute;
            top: 20px;
            left: 20px;
            text-decoration: none;
        }

        #homeicon {
            font-size: 40px;
            color: pink;
            text-shadow: 2px 1px 2px rgb(245, 14, 133);
            transition: 0.3s;
        }

        #homeicon:hover {
            transform: scale(1.2);
            color: #BDB2FF;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    </style>
</head>

<body>

    <a href="index.HTML" id="homeiconlink">
        <i class="bi bi-house" id="homeicon"></i>
    </a>

    <div class="container">
        <h1>ABOUT</h1>

        <p>
            Heyy there! This is a mock ecommerce website I (Kimberly Zinzile Khumalo) built for practice and for my software development portfolio.
        </p>

        <p>
            If you happen to come across it, feel free to interact with it and explore the features.
        </p>
    </div>

</body>
</html>
